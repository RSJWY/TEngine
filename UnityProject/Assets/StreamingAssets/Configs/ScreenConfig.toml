# Windows Standalone 多显示器窗口布局配置。
# 坐标使用桌面像素坐标系。DisplayIndex 0 表示 Unity 主显示器。

# 主显示器窗口。
[[Screens]]
DisplayIndex = 0
Activate = true
X = 0
Y = 0
Width = 1920
Height = 1080
Topmost = false
Borderless = false

# 副显示器窗口。
[[Screens]]
DisplayIndex = 1
Activate = true
X = 1920
Y = 0
Width = 1920
Height = 1080
Topmost = false
Borderless = false
