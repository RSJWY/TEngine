<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">DynamicSpawn runtime flow</title>
  <desc id="desc">DynamicSpawn runtime architecture from lightweight scene placeholders to YooAsset async loading, registry, and completion event.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, "Microsoft YaHei", sans-serif; fill: #102a43; }
      .subtitle { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #486581; }
      .box-title { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #102a43; }
      .box-text { font: 400 16px Arial, "Microsoft YaHei", sans-serif; fill: #334e68; }
      .small { font: 400 14px Arial, "Microsoft YaHei", sans-serif; fill: #52606d; }
      .badge { font: 700 13px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="60" y="68" class="title">DynamicSpawn 运行时链路</text>
  <text x="60" y="100" class="subtitle">场景只保存占位描述，真实 Prefab 由 Spawner 分批异步加载，并在完成后通知业务逻辑。</text>

  <g filter="url(#shadow)">
    <rect x="62" y="162" width="250" height="170" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="82" y="184" width="88" height="26" rx="13" fill="#2563eb"/>
    <text x="126" y="202" text-anchor="middle" class="badge">Scene</text>
    <text x="84" y="242" class="box-title">DynamicSpawnPoint</text>
    <text x="84" y="276" class="box-text">location</text>
    <text x="84" y="302" class="box-text">alignMode</text>
    <text x="84" y="328" class="box-text">registerKey</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="474" y="150" width="260" height="195" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="494" y="172" width="100" height="26" rx="13" fill="#0f766e"/>
    <text x="544" y="190" text-anchor="middle" class="badge">Spawner</text>
    <text x="496" y="232" class="box-title">DynamicSceneSpawner</text>
    <text x="496" y="266" class="box-text">CollectSpawnItems()</text>
    <text x="496" y="292" class="box-text">batchSize 削峰</text>
    <text x="496" y="318" class="box-text">CancellationToken</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="882" y="162" width="250" height="170" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="902" y="184" width="96" height="26" rx="13" fill="#ea580c"/>
    <text x="950" y="202" text-anchor="middle" class="badge">YooAsset</text>
    <text x="904" y="242" class="box-title">LoadGameObjectAsync</text>
    <text x="904" y="276" class="box-text">按 location 加载</text>
    <text x="904" y="302" class="box-text">挂到占位节点下</text>
    <text x="904" y="328" class="box-text">Destroy 自动归还引用</text>
  </g>

  <path d="M318 247 C370 247, 408 247, 466 247" class="line"/>
  <text x="392" y="229" text-anchor="middle" class="small">收集加载项</text>
  <path d="M742 247 C794 247, 824 247, 874 247" class="line"/>
  <text x="810" y="229" text-anchor="middle" class="small">异步实例化</text>

  <g filter="url(#shadow)">
    <rect x="250" y="440" width="255" height="132" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="270" y="462" width="100" height="26" rx="13" fill="#7c3aed"/>
    <text x="320" y="480" text-anchor="middle" class="badge">Registry</text>
    <text x="272" y="522" class="box-title">registerKey 查找</text>
    <text x="272" y="552" class="box-text">LevelPortal -> GameObject</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="698" y="440" width="285" height="132" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="718" y="462" width="92" height="26" rx="13" fill="#0891b2"/>
    <text x="764" y="480" text-anchor="middle" class="badge">Event</text>
    <text x="720" y="512" class="box-title">Event_DynamicSpawn</text>
    <text x="720" y="537" class="box-title">Complete</text>
    <text x="720" y="563" class="box-text">场景业务在完成后初始化</text>
  </g>

  <path d="M602 346 C560 402, 493 438, 442 456" class="soft-line"/>
  <path d="M648 346 C696 402, 752 430, 800 456" class="soft-line"/>

  <g>
    <circle cx="96" cy="607" r="7" fill="#2563eb"/>
    <text x="112" y="612" class="small">轻量场景描述</text>
    <circle cx="282" cy="607" r="7" fill="#0f766e"/>
    <text x="298" y="612" class="small">可控加载入口</text>
    <circle cx="468" cy="607" r="7" fill="#ea580c"/>
    <text x="484" y="612" class="small">YooAsset location</text>
    <circle cx="672" cy="607" r="7" fill="#0891b2"/>
    <text x="688" y="612" class="small">完成事件</text>
  </g>
</svg>
