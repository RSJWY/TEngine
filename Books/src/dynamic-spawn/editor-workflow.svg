<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">DynamicSpawn editor workflow</title>
  <desc id="desc">Editor workflow for DynamicSpawn, from converting prefabs into placeholders to validating, previewing, saving, and runtime loading.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f4f0ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111827" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .step { font: 700 22px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 400 16px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .num { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="60" y="68" class="title">DynamicSpawn 编辑器工作流</text>
  <text x="60" y="100" class="subtitle">工具链让内容制作仍然可视化，同时避免预览对象污染场景文件。</text>

  <g filter="url(#shadow)">
    <rect x="80" y="172" width="220" height="150" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="112" cy="205" r="18" fill="#2563eb"/>
    <text x="112" y="211" text-anchor="middle" class="num">1</text>
    <text x="112" y="254" class="step">转换或添加</text>
    <text x="112" y="286" class="text">真实 Prefab 实例</text>
    <text x="112" y="311" class="text">变成 [Spawn] 节点</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="172" width="220" height="150" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="402" cy="205" r="18" fill="#0f766e"/>
    <text x="402" y="211" text-anchor="middle" class="num">2</text>
    <text x="402" y="254" class="step">配置字段</text>
    <text x="402" y="286" class="text">location / alignMode</text>
    <text x="402" y="311" class="text">registerKey 可选</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="172" width="220" height="150" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="692" cy="205" r="18" fill="#ea580c"/>
    <text x="692" y="211" text-anchor="middle" class="num">3</text>
    <text x="692" y="254" class="step">临时预览</text>
    <text x="692" y="286" class="text">HideFlags.DontSave</text>
    <text x="692" y="311" class="text">不写入 .unity</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="172" width="170" height="150" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="982" cy="205" r="18" fill="#7c3aed"/>
    <text x="982" y="211" text-anchor="middle" class="num">4</text>
    <text x="982" y="254" class="step">校验保存</text>
    <text x="982" y="286" class="text">异常筛选</text>
    <text x="982" y="311" class="text">清理旧引用</text>
  </g>

  <path d="M305 247 C326 247, 340 247, 362 247" class="line"/>
  <path d="M595 247 C616 247, 630 247, 652 247" class="line"/>
  <path d="M885 247 C910 247, 920 247, 942 247" class="line"/>

  <g filter="url(#shadow)">
    <rect x="235" y="440" width="730" height="112" rx="22" fill="#111827"/>
    <text x="278" y="486" class="step" style="fill:#ffffff">运行时结果</text>
    <text x="278" y="520" class="text" style="fill:#d1d5db">DynamicSceneSpawner 收集 SpawnPoint，按 YooAsset location 分批加载，</text>
    <text x="278" y="546" class="text" style="fill:#d1d5db">完成后发送 Event_DynamicSpawnComplete。</text>
  </g>

  <path d="M1035 325 C1035 398, 967 442, 955 470" class="line"/>
  <path d="M188 325 C188 395, 242 435, 250 468" class="line"/>
</svg>
